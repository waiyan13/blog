{% extends "base.html" %}
{% block content %}
<main class="fn-default">
	<ul class="article-list">
	{% for article in articles_page.object_list %}
		<li class="article-item">
			<a href="{{ SITEURL}}/{{ article.url }}" class="article-title link-color">{{ article.title }}</a>
			{{ article.summary }}
		</li>
	{% endfor %}
	</ul>
</main>
{% endblock content %}
